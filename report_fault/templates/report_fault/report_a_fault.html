<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report Fault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#7b7a7d",
                        "on-tertiary-container": "#524c68",
                        "inverse-surface": "#0e0e0f",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0056d2",
                        "tertiary-container": "#e3dbfd",
                        "surface": "#fcf8f9",
                        "tertiary-dim": "#55506b",
                        "background": "#fcf8f9",
                        "inverse-on-surface": "#9e9c9d",
                        "surface-dim": "#dbd9dd",
                        "surface-container": "#f0edef",
                        "inverse-primary": "#5b8cff",
                        "tertiary-fixed": "#e3dbfd",
                        "surface-container-highest": "#e4e2e5",
                        "tertiary": "#615b77",
                        "primary-container": "#dae2ff",
                        "error-container": "#fe8983",
                        "primary-fixed": "#dae2ff",
                        "surface-container-high": "#eae7ea",
                        "on-tertiary": "#fcf7ff",
                        "secondary-fixed-dim": "#d5d4d8",
                        "error-dim": "#4e0309",
                        "surface-bright": "#fcf8f9",
                        "on-secondary": "#faf8fc",
                        "secondary-dim": "#535356",
                        "secondary-fixed": "#e4e2e6",
                        "on-surface-variant": "#5f5f61",
                        "on-primary-fixed": "#003991",
                        "on-secondary-fixed": "#3f3f43",
                        "secondary": "#5f5f62",
                        "on-background": "#323235",
                        "surface-variant": "#e4e2e5",
                        "surface-container-low": "#f6f3f4",
                        "primary-fixed-dim": "#c6d3ff",
                        "primary-dim": "#004bb9",
                        "on-error-container": "#752121",
                        "on-primary-container": "#004ab7",
                        "error": "#9f403d",
                        "on-tertiary-fixed": "#3f3a54",
                        "surface-tint": "#0056d2",
                        "outline-variant": "#b3b1b4",
                        "on-error": "#fff7f6",
                        "on-primary": "#f8f7ff",
                        "on-secondary-container": "#515155",
                        "on-primary-fixed-variant": "#0053cc",
                        "secondary-container": "#e4e2e6",
                        "on-secondary-fixed-variant": "#5b5b5f",
                        "tertiary-fixed-dim": "#d5cdee",
                        "on-surface": "#323235",
                        "on-tertiary-fixed-variant": "#5b5672"
                    },
                    fontFamily: {
                        "headline": ["Public Sans"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-pill {
            background: linear-gradient(135deg, #0056d2 0%, #004bb9 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased">
<!-- TopAppBar from Shared Components JSON -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-6 h-16 bg-[#fcf8f9]/80 dark:bg-[#323235]/80 backdrop-blur-md">
<div class="flex items-center w-full justify-between">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:bg-[#f0edef] dark:hover:bg-[#5f5f61] transition-colors rounded-full active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-[#0056D2]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-bold text-[1.75rem] tracking-tight text-[#323235] dark:text-[#fcf8f9]">Report Fault</h1>
</div>
<!-- Empty div for balance -->
<div class="w-10"></div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Section 1: Type of Fault -->
<section class="mb-8">
<h2 class="text-on-surface-variant font-label text-sm uppercase tracking-wider mb-4 px-1">Type of Fault<span class="text-red-500 ml-1">*</span></h2>
<div class="flex overflow-x-auto gap-3 pb-2 scrollbar-hide">
<!-- Electricity -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors duration-200">
<span class="material-symbols-outlined text-secondary text-3xl mb-1" data-icon="bolt">bolt</span>
<span class="text-xs font-medium">Electricity</span>
</button>
<!-- Water (Selected) -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl active-pill text-on-primary shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl mb-1" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="text-xs font-semibold">Water</span>
</button>
<!-- Road -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors duration-200">
<span class="material-symbols-outlined text-secondary text-3xl mb-1" data-icon="add_road">add_road</span>
<span class="text-xs font-medium">Road</span>
</button>
<!-- Waste -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors duration-200">
<span class="material-symbols-outlined text-secondary text-3xl mb-1" data-icon="delete_outline">delete_outline</span>
<span class="text-xs font-medium">Waste</span>
</button>
<!-- Other -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors duration-200">
<span class="material-symbols-outlined text-secondary text-3xl mb-1" data-icon="more_horiz">more_horiz</span>
<span class="text-xs font-medium">Other</span>
</button>
</div>
</section>
<!-- Section 2: Contextual Sub-Selection -->
<section class="mb-8">
<div class="bg-surface-container rounded-xl p-4 border-l-4 border-primary">
<label class="block text-sm font-semibold text-primary mb-2">Quick Selection: Water</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary appearance-none font-medium">
<option>Burst Pipe</option>
<option>No Water</option>
<option>Sewerage Leak</option>
<option>Water Meter Issue</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Section 3: Visual Evidence -->
<section class="mb-8">
<h2 class="text-on-surface-variant font-label text-sm uppercase tracking-wider mb-4 px-1">Visual Evidence</h2>
<button class="w-full aspect-video rounded-xl bg-surface-container-lowest border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center group hover:bg-surface-container-low transition-all">
<div class="relative mb-3">
<span class="material-symbols-outlined text-5xl text-secondary group-hover:text-primary transition-colors" data-icon="photo_camera">photo_camera</span>
<div class="absolute -top-1 -right-1 bg-primary text-on-primary w-6 h-6 rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
</div>
</div>
<span class="text-sm font-medium text-on-surface-variant">Capture or upload photo (Optional)</span>
</button>
</section>
<!-- Section 4: Location Details -->
<section class="mb-8">
<h2 class="text-on-surface-variant font-label text-sm uppercase tracking-wider mb-4 px-1">Location Details<span class="text-red-500 ml-1">*</span></h2>
<div class="flex gap-2 mb-4">
<div class="relative flex-grow">
<select class="w-full bg-surface-container-high border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary appearance-none">
<option>Select neighborhood or street</option>
<option>Oakwood Avenue</option>
<option>Cedar Heights</option>
<option>Pine District</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="location_on">location_on</span>
</div>
</div>
<button class="bg-primary-container text-on-primary-container p-3 rounded-lg hover:bg-primary hover:text-on-primary transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Map Preview -->
<div class="w-full h-40 rounded-xl overflow-hidden relative shadow-inner bg-surface-container-highest">
<img class="w-full h-full object-cover opacity-80" data-alt="clean minimalist city map with primary blue pin point showing a quiet suburban residential intersection" data-location="London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUIUYn_gt16lcmZ8Rqa2XkdF2Qvp-zZ2cCql7v1WWvAidHnlFagzCUVtkB71qmy4r5-3VVcDrj-7kFj0LJtt9vHl3K10dTfRDUXK6mY6B89gmUydrLoDuyfUpT_wFrne1I-SpDO3SUJMOT7m6GkmrFShubTbJJqEONd3ArTgIgwurvHBTbk1pH1gv5LnwbRr0ZrlaUsalovLQezouOLgNFz5go8yXe8zuQQ0QRKKVZxAllzHgj23azTrWvB8tSvb09HI3tEwstERTr"/>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-4 h-1.5 bg-on-surface/20 rounded-full blur-[2px]"></div>
</div>
</div>
</div>
</section>
<!-- Section 5: Fault Description -->
<section class="mb-12">
<h2 class="text-on-surface-variant font-label text-sm uppercase tracking-wider mb-4 px-1">Fault Description<span class="text-red-500 ml-1">*</span></h2>
<div class="relative bg-surface-container-high rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary transition-all">
<textarea class="w-full bg-transparent border-none p-4 pb-12 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/60 font-body text-base resize-none" placeholder="Please describe the issue in detail..." rows="4"></textarea>
<div class="absolute bottom-3 right-3 flex items-center gap-2">
<button class="w-10 h-10 rounded-full bg-surface-container-lowest text-primary shadow-sm hover:shadow-md transition-shadow active:scale-90 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</div>
</section>
<!-- Section 6: Submit (Floating style at bottom) -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-background/90 backdrop-blur-lg">
<button class="w-full h-16 active-pill text-on-primary rounded-xl flex items-center justify-center gap-3 shadow-xl shadow-primary/30 active:scale-95 duration-150 transition-transform">
<span class="material-symbols-outlined" data-icon="send">send</span>
<span class="font-headline font-bold text-lg tracking-wide uppercase">Submit Report</span>
</button>
</div>
</main>
</body></html>
